<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Europris">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="europris-app-icon-180-v28.png">
  <link rel="icon" type="image/png" sizes="192x192" href="europris-app-icon-192-v28.png">
  <link rel="icon" type="image/png" sizes="512x512" href="europris-app-icon-512-v28.png">

  <title>Europris</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --green: #08783e;
      --green-dark: #065f34;
      --green-text: #ffffff;
      --key: #e5e7eb;
      --danger: #b91c1c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #111827;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #374151;
        --key: #1f2937;
        --danger: #fca5a5;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 14px;
    }

    button, input { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }
    button:disabled { cursor: not-allowed; opacity: .48; }

    main {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .10);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(112px, 1fr) auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 12px;
    }

    .brand-mark {
      min-height: 80px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 6px 8px 0;
      overflow: hidden;
    }

    .brand-character {
      width: 54px;
      height: 68px;
      flex: 0 0 54px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, .22));
    }

    .brand-copy {
      min-width: 0;
      line-height: 1.05;
    }

    .brand-name {
      color: var(--green);
      font-weight: 950;
      letter-spacing: .05em;
      font-size: .92rem;
    }

    .brand-tagline {
      margin-top: 4px;
      color: var(--muted);
      font-size: .68rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .topbar-controls {
      width: 158px;
      display: grid;
      gap: 7px;
    }

    .languages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin: 0;
    }

    .language {
      min-width: 48px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    .language.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    h1 {
      margin: 0 0 7px;
      font-size: 1.4rem;
    }

    .description {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.4;
    }

    .location-panel {
      margin-bottom: 13px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--green) 7%, transparent);
    }

    .location-heading { margin: 0 0 6px; font-size: 1rem; font-weight: 850; }
    .location-message { color: var(--muted); line-height: 1.35; font-size: .92rem; }
    .location-result { margin-top: 9px; font-weight: 800; line-height: 1.35; }
    .location-actions { display: flex; gap: 8px; margin-top: 10px; }

    .location-button {
      flex: 1;
      min-height: 43px;
      border: 1px solid var(--green);
      border-radius: 11px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .location-button.secondary {
      background: transparent;
      color: var(--green);
    }

    .search {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0 14px;
      background: transparent;
      color: var(--text);
      font-size: 1.08rem;
      outline: none;
    }

    .search:focus { border-color: var(--green); }

    .results {
      display: grid;
      gap: 8px;
      margin-top: 9px;
      max-height: 245px;
      overflow-y: auto;
    }

    .result {
      width: 100%;
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .result-number {
      display: inline-block;
      min-width: 50px;
      color: var(--green);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .result-name { font-weight: 750; font-size: 1rem; }

    .selected {
      margin-top: 12px;
      min-height: 72px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 8px 12px;
    }

    .selected-number {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--green);
    }

    .selected-name {
      color: var(--muted);
      font-size: .92rem;
      margin-top: 3px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 11px;
    }

    .key {
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--key);
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 850;
    }


    .trailer-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px 72px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px 11px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--green) 5%, transparent);
    }

    .trailer-label {
      font-weight: 900;
      line-height: 1.12;
    }

    .trailer-hint {
      margin-top: 3px;
      color: var(--muted);
      font-size: .72rem;
      line-height: 1.15;
    }

    .trailer-field {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .trailer-field-label {
      text-align: center;
      color: var(--muted);
      font-size: .68rem;
      font-weight: 850;
      line-height: 1;
    }

    .trailer-input,
    .tour-input {
      width: 100%;
      min-height: 46px;
      border: 2px solid var(--green);
      border-radius: 11px;
      background: var(--surface);
      color: var(--text);
      text-align: center;
      font-size: 1.18rem;
      font-weight: 950;
    }

    .history-trailer {
      border-top: 1px solid var(--border);
    }

    .history-trailer:first-child {
      border-top: 0;
    }

    .history-trailer-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      background: color-mix(in srgb, var(--green) 8%, transparent);
      font-weight: 900;
    }

    .history-trailer-count {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    .main-actions {
      display: grid;
      gap: 9px;
      margin-top: 11px;
    }

    .action-button {
      width: 100%;
      min-height: 58px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 850;
    }

    .open {
      border: 0;
      background: var(--green);
      color: var(--green-text);
    }

    .navigate {
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
    }

    .navigate:not(:disabled):active,
    .navigate:not(:disabled):focus-visible {
      background: color-mix(in srgb, var(--green) 12%, transparent);
    }


    /* Tylko trzy kafelki zależne od wyboru sklepu:
       nieaktywne = czerwony napis, aktywne = dotychczasowy zielony. */
    #navigate:disabled,
    #call:disabled,
    #callPrivate:disabled {
      color: #e60000;
    }

    .error {
      min-height: 23px;
      margin-top: 8px;
      color: #e60000;
      font-weight: 700;
    }

    .recent-title {
      margin-top: 15px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 750;
    }

    .recent {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chip {
      min-height: 40px;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      font-weight: 750;
    }



    .phone-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }



    .private-panel[hidden] {
      display: none !important;
    }

    .private-panel {
      margin-top: 9px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: grid;
      gap: 8px;
    }

    .private-panel input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      padding: 0 10px;
    }

    .private-panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .private-panel-actions button {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
      font-weight: 800;
    }

    .private-panel-actions .delete {
      border-color: #e60000;
      color: #e60000;
    }

    .private-contact-info {
      color: var(--muted);
      font-size: .88rem;
      text-align: center;
      min-height: 20px;
    }

    .history-toggle {
      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    .history-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-title { margin: 0; font-size: 1.05rem; }

    .history-close {
      min-width: 42px;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-weight: 900;
    }

    .history-controls {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .history-controls input,
    .history-controls button {
      min-height: 44px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0 10px;
      font-weight: 750;
    }

    .history-controls button {
      border-color: var(--green);
      color: var(--green);
    }

    .history-summary {
      margin: 8px 0 10px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 700;
    }

    .history-list { display: grid; gap: 10px; }


    .history-day {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: color-mix(in srgb, var(--green) 4%, transparent);
    }

    .history-day-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 900;
    }

    .history-day-count {
      color: var(--muted);
      font-size: .86rem;
      white-space: nowrap;
    }

    .history-day-list {
      display: grid;
    }

    .history-day .history-item {
      border: 0;
      border-radius: 0;
      border-bottom: 1px solid var(--border);
    }

    .history-day .history-item:last-child {
      border-bottom: 0;
    }


    .history-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .history-item-main { display: grid; gap: 3px; }
    .history-item-number { color: var(--green); font-weight: 900; }
    .history-item-date { color: var(--muted); font-size: .86rem; }

    .history-item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .history-item-actions button {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      padding: 0 9px;
      font-weight: 750;
      font-size: .86rem;
    }

    .history-item-actions .delete {
      color: #e60000;
      border-color: #e60000;
    }

    .history-empty {
      color: var(--muted);
      text-align: center;
      padding: 14px 6px;
    }


    @media (max-width: 360px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .brand-mark {
        min-height: auto;
      }

      .topbar-controls {
        width: 100%;
      }
    }

    @media print {
      body { background: #fff; color: #000; padding: 0; }

      .languages, .location-panel, .search, .results, .selected, .keypad,
      .main-actions, #error, #historyToggle, .history-close,
      .history-controls, .status, .footer {
        display: none !important;
      }

      .card { border: 0; box-shadow: none; padding: 0; }
      .history-panel { display: block !important; border: 0; margin: 0; padding: 0; }
      .history-item { break-inside: avoid; border-color: #bbb; }
      .history-item-actions { display: none !important; }
    }


    .brand-mark { -webkit-user-select:none; user-select:none; touch-action:manipulation; }
    .admin-overlay { position:fixed; inset:0; z-index:1000; display:grid; place-items:center; padding:18px; background:rgba(0,0,0,.58); }
    .admin-overlay[hidden], .admin-panel[hidden] { display:none !important; }
    .admin-dialog { width:min(100%,390px); padding:18px; border:1px solid var(--border); border-radius:18px; background:var(--surface); box-shadow:0 18px 55px rgba(0,0,0,.32); }
    .admin-dialog h2 { margin:0 0 8px; color:var(--green); font-size:1.15rem; }
    .admin-dialog p { margin:0 0 12px; color:var(--muted); line-height:1.35; }
    .admin-pin-input { width:100%; min-height:52px; padding:0 12px; border:2px solid var(--green); border-radius:12px; background:var(--surface); color:var(--text); text-align:center; font-size:1.4rem; font-weight:900; letter-spacing:.28em; }
    .admin-dialog-actions,.admin-toolbar,.admin-profile-grid,.admin-card-actions { display:grid; gap:8px; }
    .admin-dialog-actions { grid-template-columns:1fr 1fr; margin-top:12px; }
    .admin-dialog-actions button,.admin-toolbar button,.admin-card-actions button,.admin-file-label { min-height:42px; padding:8px 10px; border:1px solid var(--green); border-radius:10px; background:transparent; color:var(--green); font-weight:850; text-align:center; }
    .admin-dialog-actions .primary,.admin-toolbar .primary,.admin-card-actions .primary { background:var(--green); color:#fff; }
    .admin-dialog-error { min-height:20px; margin-top:8px; color:#d71920; font-weight:800; text-align:center; }
    .admin-panel { margin-top:12px; padding:12px; border:2px solid var(--green); border-radius:16px; background:color-mix(in srgb,var(--green) 3%,var(--surface)); }
    .admin-header { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .admin-title { margin:0; color:var(--green); font-size:1.15rem; }
    .admin-close { width:38px; min-height:38px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--text); font-size:1.3rem; }
    .admin-profile[hidden],
    .admin-toolbar[hidden] {
      display: none !important;
    }

    .admin-profile { padding:10px; border:1px solid var(--border); border-radius:12px; }
    .admin-profile-grid { grid-template-columns:1fr; }
    .admin-profile label { display:grid; gap:4px; color:var(--muted); font-size:.75rem; font-weight:800; }
    .admin-profile input { min-height:42px; padding:7px 9px; border:1px solid var(--border); border-radius:9px; background:var(--surface); color:var(--text); font-size:.95rem; }
    .admin-toolbar { grid-template-columns:1fr 1fr; margin-top:10px; }
    .admin-file-label { display:grid; place-items:center; cursor:pointer; }
    .admin-sync-panel { display:grid; gap:9px; margin-top:10px; padding:10px; border:1px solid var(--border); border-radius:12px; background:var(--surface); }
    .admin-sync-row { display:grid; grid-template-columns:1fr; gap:8px; align-items:end; }

    .admin-date-select.plan-available {
      border: 2px solid #08783e;
      color: #08783e;
      background: color-mix(in srgb, #08783e 9%, var(--surface));
      font-weight: 950;
    }

    .admin-date-select.plan-missing {
      border: 2px solid #d71920;
      color: #d71920;
      background: color-mix(in srgb, #d71920 8%, var(--surface));
      font-weight: 950;
    }

    .admin-date-select option.plan-option-available {
      color: #08783e;
      font-weight: 900;
    }

    .admin-date-select option.plan-option-missing {
      color: #d71920;
      font-weight: 900;
    }
    .admin-sync-row label { display:grid; gap:4px; color:var(--muted); font-size:.78rem; font-weight:850; }
    .admin-date-select { width:100%; min-height:43px; padding:7px 9px; border:1px solid var(--border); border-radius:9px; background:var(--surface); color:var(--text); font-size:.95rem; font-weight:800; }
    .admin-sync-button { min-height:43px; padding:8px 12px; border:1px solid var(--green); border-radius:9px; background:var(--green); color:white; font-weight:900; }
    .admin-sync-status { min-height:20px; color:var(--muted); font-size:.8rem; line-height:1.35; }
    .admin-sync-status.ok { color:#08783e; }
    .admin-sync-status.error { color:#d71920; }
    .admin-sync-status.loading { color:#9a6800; }
    .admin-summary { margin:12px 0; padding:10px; border-radius:11px; background:color-mix(in srgb,var(--green) 8%,transparent); line-height:1.45; font-weight:750; }
    .admin-plan-list { display:grid; gap:12px; }
    .admin-course { overflow:hidden; border:1px solid var(--border); border-radius:13px; background:var(--surface); }
    .admin-course-header { display:flex; justify-content:space-between; gap:8px; padding:10px 12px; background:color-mix(in srgb,var(--green) 10%,transparent); color:var(--green); font-weight:900; }
    .admin-stop { padding:11px 12px; border-top:1px solid var(--border); }
    .admin-stop-title { font-size:1rem; font-weight:950; }
    .admin-stop-meta { margin-top:5px; color:var(--muted); font-size:.82rem; line-height:1.45; }
    .admin-card-actions { grid-template-columns:repeat(2,minmax(0,1fr)); margin-top:9px; }
    .admin-split { margin-top:9px; padding:9px; border:1px solid #e1a000; border-radius:10px; background:rgba(225,160,0,.08); }
    .admin-split-title { color:#9a6800; font-weight:950; }
    .admin-peer { margin-top:7px; padding-top:7px; border-top:1px dashed rgba(154,104,0,.45); font-size:.82rem; line-height:1.4; }

    .admin-phone-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      padding: 5px 9px;
      border: 1px solid var(--green);
      border-radius: 9px;
      color: var(--green);
      font-weight: 900;
      text-decoration: none;
    }
    .admin-conflict { display:inline-block; margin-top:4px; padding:2px 7px; border-radius:999px; font-size:.72rem; font-weight:900; }
    .admin-conflict.low { background:rgba(0,128,68,.12); color:#08783e; }
    .admin-conflict.medium { background:rgba(225,160,0,.15); color:#9a6800; }
    .admin-conflict.high { background:rgba(215,25,32,.12); color:#d71920; }
    .admin-empty { padding:15px; color:var(--muted); text-align:center; }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }

    .footer {
      margin: 16px 4px 4px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
      line-height: 1.35;
    }
.admin-return-loads{margin-top:12px;padding:11px;border:1px solid #d71920;border-left:5px solid #d71920;border-radius:12px;background:#fff2f2}
.admin-return-loads-title{margin-bottom:8px;color:#b31319;font-weight:950;text-transform:uppercase;letter-spacing:.02em}
.admin-return-load{position:relative;padding:9px 58px 9px 0;border-top:1px solid rgba(215,25,32,.2);color:#8f1116}
.admin-return-load:first-of-type{border-top:0}
.admin-return-load-meta{margin-top:4px;color:#9d3135;font-size:.82rem;line-height:1.4}
.admin-return-load-badge{position:absolute;top:8px;right:0;padding:3px 7px;border-radius:999px;background:#d71920;color:#fff;font-size:.67rem;font-weight:950;white-space:nowrap}

    .location-actions-split {
      grid-template-columns: 1fr 1fr;
    }

    .location-actions-split .location-button {
      width: 100%;

  function currentLocalDateKey() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function trailerStorageKey() {
    return `${TRAILER_KEY_PREFIX}${currentLocalDateKey()}`;
  }

  function tourStorageKey() {
    return `${TOUR_KEY_PREFIX}${currentLocalDateKey()}`;
  }

  function cleanTrailerNumber(value) {
    return String(value || "").replace(/\D/g, "").slice(0, 2);
  }

  function cleanTourNumber(value) {
    return String(value || "").replace(/\D/g, "").slice(0, 2);
  }

  function resetAssignmentForNewDay() {
    tourNumber.value = "";
    trailerNumber.value = "";
    localStorage.setItem(ACTIVE_ASSIGNMENT_DATE_KEY, currentLocalDateKey());
    localStorage.removeItem(ACTIVE_TOUR_KEY);
    localStorage.removeItem(ACTIVE_TRAILER_KEY);
  }

  function loadDailyAssignment() {
    const today = currentLocalDateKey();
    const savedDate = localStorage.getItem(ACTIVE_ASSIGNMENT_DATE_KEY);

    if (savedDate !== today) {
      resetAssignmentForNewDay();
      return;
    }

    const savedTour = cleanTourNumber(
      localStorage.getItem(ACTIVE_TOUR_KEY) ||
      localStorage.getItem(tourStorageKey()) ||
      ""
    );

    const savedTrailer = cleanTrailerNumber(
      localStorage.getItem(ACTIVE_TRAILER_KEY) ||
      localStorage.getItem(trailerStorageKey()) ||
      ""
    );

    tourNumber.value = savedTour;
    trailerNumber.value = savedTrailer;
  }

  function saveDailyAssignment() {
    const tour = cleanTourNumber(tourNumber.value);
    const trailer = cleanTrailerNumber(trailerNumber.value);
    const today = currentLocalDateKey();

    localStorage.setItem(ACTIVE_ASSIGNMENT_DATE_KEY, today);

    // Pusty stan podczas przeładowania lub powrotu nie kasuje
    // wcześniej zapisanych wartości z bieżącego dnia.
    if (tour) {
      tourNumber.value = tour;
      localStorage.setItem(ACTIVE_TOUR_KEY, tour);
      localStorage.setItem(tourStorageKey(), tour);
    }

    if (trailer) {
      trailerNumber.value = trailer;
      localStorage.setItem(ACTIVE_TRAILER_KEY, trailer);
      localStorage.setItem(trailerStorageKey(), trailer);
    }
  }

  function restoreDailyAssignment() {
    loadDailyAssignment();
  }

  function defaultAdminProfile(profileId = activeAdminProfileId) {

  function adminProfile(){
    const fallback = defaultAdminProfile();
    return {
      id: activeAdminProfileId || fallback.id,
      name: String(adminDriverName.value || fallback.name).trim(),
      phone: adminDigits(adminDriverPhone.value || fallback.phone),
      aliases: String(adminDriverAliases.value || fallback.aliases.join(","))
        .split(",")
        .map(value => value.trim())
        .filter(Boolean)
    };
  }

  function saveAdminProfile(){
    if (!activeAdminProfileId) return;
    localStorage.setItem(
      adminProfileStorageKey(),
      JSON.stringify(adminProfile())
    );
  }

  function loadAdminProfile(profileId = activeAdminProfileId){
    const fallback = defaultAdminProfile(profileId);

    try {
      const saved = JSON.parse(
        localStorage.getItem(adminProfileStorageKey(profileId)) || "null"
      );

      const profile = saved || fallback;
      adminDriverName.value = profile.name || fallback.name;
      adminDriverPhone.value = profile.phone || fallback.phone;
      adminDriverAliases.value = Array.isArray(profile.aliases)
        ? profile.aliases.join(", ")
        : fallback.aliases.join(", ");
    } catch {
      adminDriverName.value = fallback.name;
      adminDriverPhone.value = fallback.phone;
      adminDriverAliases.value = fallback.aliases.join(", ");
    }
  }

  function adminJsonp(action, params = {}) {
    return new Promise((resolve, reject) => {
      const callbackName = `__europrisJsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement("script");
      const cleanup = () => { delete window[callbackName]; script.remove(); };
      const timeout = window.setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 20000);
      window[callbackName] = data => { window.clearTimeout(timeout); cleanup(); resolve(data); };
      const query = new URLSearchParams({ action, token: ADMIN_API_TOKEN, callback: callbackName, _: String(Date.now()), ...params });
      script.src = `${ADMIN_API_URL}?${query.toString()}`;
      script.onerror = () => { window.clearTimeout(timeout); cleanup(); reject(new Error("network")); };
      document.head.appendChild(script);
    });
  }

  function formatAdminDate(dateKey) {
    const match = String(dateKey || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return match ? `${match[3]}.${match[2]}.${match[1]}` : String(dateKey || "");
  }

  function formatAdminTimestamp(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "—";
    return date.toLocaleString(language==="no"?"nb-NO":language==="en"?"en-GB":"pl-PL",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  }

  function addDaysToLocalDate(dateKey, offset) {
    const [year, month, day] = String(dateKey).split("-").map(Number);
    const date = new Date(year, month - 1, day);
    date.setDate(date.getDate() + offset);

    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
  }

  function adminVisibleDateRange() {
    const today = currentLocalDateKey();
    return [-1, 0, 1, 2, 3, 4].map(offset => addDaysToLocalDate(today, offset));

    const today = currentLocalDateKey();

    if (availableDates.includes(today)) {
      return today;
    }

    const nearestFuture = visibleDates.find(date =>
      date >= today && availableDates.includes(date)
    );

    return nearestFuture || today;
  }

  function fillAdminDateOptions(items) {

    const availableItems = new Map(
      items

    const availableDates = [...availableItems.keys()];
    const selected = chooseDefaultAdminDate(visibleDates, availableDates);

    adminApiDates = availableDates;
    adminDeliveryDate.replaceChildren();

    visibleDates.forEach(date => {

      option.dataset.available = item ? "1" : "0";
      option.className = item ? "plan-option-available" : "plan-option-missing";

    adminDeliveryDate.disabled = false;
    updateAdminDateStatusColor();

  async function loadAdminPlanFromApi(date) {
    const text = translations[language];
    const selectedDate = String(date || adminDeliveryDate.value || "");
    if (!selectedDate) return;

    localStorage.setItem(ADMIN_LAST_DATE_KEY, selectedDate);

    const selectedOption = [...adminDeliveryDate.options].find(
      option => option.value === selectedDate
    );

    if (selectedOption && selectedOption.dataset.available !== "1") {
      localStorage.removeItem(ADMIN_PLAN_KEY);
      adminSyncStatus.className = "admin-sync-status error";
      adminSyncStatus.textContent = text.adminSyncNoPlan(
        formatAdminDate(selectedDate)
      );
      renderAdminPlan();
      return;
    }
    adminSyncStatus.className = "admin-sync-status loading";
    adminSyncStatus.textContent = text.adminSyncLoading;
    try {
      const plan = await adminJsonp("plan", {date:selectedDate});
      if (!plan?.ok || !Array.isArray(plan.rows)) {
        localStorage.removeItem(ADMIN_PLAN_KEY);
        adminSyncStatus.className = "admin-sync-status error";
        adminSyncStatus.textContent = text.adminSyncNoPlan(formatAdminDate(selectedDate));
        renderAdminPlan();
        return;
      }
      saveAdminPlan(plan);
      adminSyncStatus.className = "admin-sync-status ok";
      adminSyncStatus.textContent = text.adminSyncOk(formatAdminDate(selectedDate),formatAdminTimestamp(plan.updatedAt));
      renderAdminPlan();
    } catch {
      adminSyncStatus.className = "admin-sync-status error";
      adminSyncStatus.textContent = text.adminSyncError;
      renderAdminPlan();
    } finally {
    }
  }

  function normalized(value) {
    return String(value)
      .toLocaleLowerCase("nb-NO")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function cleanStoreName(name) {
    return String(name || "").replace(/^Europris\s*/i, "").trim();
  }

  function cleanNumber(value) {
    return String(value)
      .replace(/\D/g, "")
      .replace(/^0+(?=\d)/, "");
  }

  function hasValidCoordinates(store) {
    if (!store) return false;
    const latitude = Number(store.latitude);
    const longitude = Number(store.longitude);
    return Number.isFinite(latitude) &&
      Number.isFinite(longitude) &&
      latitude >= -90 && latitude <= 90 &&
      longitude >= -180 && longitude <= 180;
  }

  function findStoreByNumber(number) {
    return stores.find(store => String(store.number) === String(number)) || null;
  }

      privateInfo.textContent = currentPrivateContact.name || "";

      privateInfo.textContent = "";

  function publicStoreNumber(value) {
    return String(value || "").replace(/\D/g, "").replace(/^0+(?=\d)/, "");

  function publicDriversForStore(rows, storeNumber) {
    const wanted = publicStoreNumber(storeNumber);
    const grouped = new Map();

    (Array.isArray(rows) ? rows : []).forEach(row => {
      if (publicStoreNumber(row.storeNumber) !== wanted) return;

      const driver = String(row.driver || row.carrier || "").trim();
      if (!driver) return;

      const tour = String(row.tour12 || "1").trim() || "1";
      const key = `${normalized(driver)}|${tour}`;

      if (!grouped.has(key)) {
        grouped.set(key, {
          driver,
          tour,
          pallets: 0,
          deadlines: new Set()
        });
      }

      const item = grouped.get(key);
      item.pallets += Number(row.pallets) || 0;
      if (row.deadline) item.deadlines.add(String(row.deadline));
    });

    return [...grouped.values()]
      .map(item => ({
        ...item,
        deadlines: [...item.deadlines].sort()
      }))
      .sort((a, b) =>
        Number(a.tour) - Number(b.tour) ||
        normalized(a.driver).localeCompare(normalized(b.driver), "nb")
      );
  }

  async function loadPublicTodayPlan() {
    const date = publicPlanDateKey();

    if (publicTodayPlanDate === date && publicTodayPlan) {
      return publicTodayPlan;
    }

    if (publicTodayPlanPromise && publicTodayPlanDate === date) {
      return publicTodayPlanPromise;
    }

    publicTodayPlanDate = date;
    publicTodayPlanPromise = adminJsonp("plan", { date })
      .then(plan => {
        publicTodayPlan = plan?.ok && Array.isArray(plan.rows) ? plan : null;
        return publicTodayPlan;
      })
      .catch(() => {
        publicTodayPlan = null;
        return null;
      })
      .finally(() => {
        publicTodayPlanPromise = null;
      });

    return publicTodayPlanPromise;
  }

  function toRadians(value) {
    return value * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const earthRadius = 6371000;
    const dLat = toRadians(lat2 - lat1);
    const dLon = toRadians(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRadians(lat1)) *
      Math.cos(toRadians(lat2)) *
      Math.sin(dLon / 2) ** 2;
    return earthRadius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function formatDistance(meters) {
    if (meters < 1000) return `${Math.round(meters)} m`;
    return `${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)} km`;
  }

  function findNearestStore(latitude, longitude) {
    const valid = stores.filter(hasValidCoordinates);
    if (!valid.length) return null;

    let best = null;
    for (const store of valid) {
      const distance = distanceMeters(
        latitude,
        longitude,
        Number(store.latitude),
        Number(store.longitude)
      );
      if (!best || distance < best.distance) best = { store, distance };
    }
    return best;
  }

  function showNearestResult(best) {
    const text = translations[language];
    nearestStore = best.store;
    nearestDistanceMeters = best.distance;

    const name = cleanStoreName(best.store.name);
    const distance = formatDistance(best.distance);
    nearestWasAutoSelected = best.distance <= 1000;

    if (nearestWasAutoSelected) {
      void selectStore(best.store);
      locationMessage.textContent = "";
      locationResult.textContent = text.locationAuto(best.store.number, name, distance);
      useNearest.hidden = true;
      return;
    }

    locationMessage.textContent = "";
    locationResult.textContent = text.locationSuggestion(best.store.number, name, distance);
    useNearest.hidden = false;
  }

  function forceNearestStoreLocation() {
    const text = translations[language];

    useNearest.hidden = true;
    nearestStore = null;
    nearestDistanceMeters = null;
    nearestWasAutoSelected = false;
    locationResult.textContent = "";
    locationMessage.textContent = text.locationChecking;

    if (!navigator.geolocation) {
      locationMessage.textContent = text.locationUnavailable;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => {
        const best = findNearestStore(
          position.coords.latitude,
          position.coords.longitude
        );

        if (!best) {
          locationMessage.textContent = text.locationNoCoordinates;
          return;
        }

        showNearestResult(best);
      },
      error => {
        locationMessage.textContent =
          error.code === error.PERMISSION_DENIED
            ? text.locationDenied
            : text.locationUnavailable;
      },
      {
        enableHighAccuracy: true,
        timeout: 30000,
        maximumAge: 0
      }
    );
  }

  function openDatabase() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          const store = db.createObjectStore(DB_STORE, { keyPath: "id" });
          store.createIndex("createdAt", "createdAt");
          store.createIndex("month", "month");
        }

        if (!db.objectStoreNames.contains(DB_CONTACTS)) {
          db.createObjectStore(DB_CONTACTS, { keyPath: "storeNumber" });
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

      String(row.storeNumber || "") === String(storeNumber || "") &&
      String(row.tour12 || "1") === String(tour || "1")

      // Liczba naczep wynika wyłącznie z numeru tury:

  function localDateKey(value) {
    const date = new Date(value);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;

  function downloadFile(filename, content, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  async function tryLoadPlanForHistoryDate(dateKey) {
    const cached = loadAdminPlan();
    if (cached?.rows?.some(row => String(row.deliveryDate || "") === dateKey)) {
      return cached;
    }

    try {
      const remote = await adminJsonp("plan", { date: dateKey });
      return remote?.ok && Array.isArray(remote.rows) ? remote : null;
    } catch {
      return null;
    }
  }

  async function enrichHistoryEntries(entries) {
    const profile = adminProfile();
    const byDate = new Map();

    for (const item of entries) {
      const day = localDateKey(item.createdAt);
      if (!byDate.has(day)) byDate.set(day, []);
      byDate.get(day).push(item);
    }

    for (const [day, dayEntries] of byDate) {
      const plan = await tryLoadPlanForHistoryDate(day);
      if (!plan?.rows?.length) continue;

      for (const item of dayEntries) {
        // Uzupełniaj palety zawsze, gdy ich brakuje.
        // Zapisana liczba naczep nie oznacza, że rekord ma już dane o paletach.
        if ((Number(item.pallets) || 0) > 0) continue;

        const candidates = plan.rows.filter(row =>
          String(row.storeNumber || "") === String(item.storeNumber || "") &&
          String(row.tour12 || "1") === String(item.tourNumber || "1")
        );
        const own = candidates.filter(row => matchesAdminDriver(row, profile));
        const row = own[0] || candidates[0];

        if (row) {
          item.pallets = Number(row.pallets) || 0;
          item.trailerCount = String(item.tourNumber || row.tour12 || "").trim() ? 1 : 0;
        }
      }
    }

    return entries;
  }

  function monthlyTrailerTotal(entries) {
    const uniqueDayTours = new Set();

    for (const item of entries) {
      const day = localDateKey(item.createdAt);
      const tour = String(item.tourNumber || "").trim();

      if (!tour) continue;
      uniqueDayTours.add(`${day}|${tour}`);
    }

    return uniqueDayTours.size;
  }

  function escapePrintHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, character => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[character]));

  async function buildMonthlySummaryRows(month) {
    let entries = (await getAllDeliveries())
      .filter(item => localDateKey(item.createdAt).slice(0, 7) === month)
      .sort((a, b) => String(a.createdAt).localeCompare(String(b.createdAt)));

    entries = await enrichHistoryEntries(entries);
    const days = new Map();

    for (const item of entries) {
      const dateKey = localDateKey(item.createdAt);
      if (!days.has(dateKey)) {
        days.set(dateKey, { dateKey, stores: 0, pallets: 0, tours: new Set() });
      }

      const day = days.get(dateKey);
      day.stores++;
      day.pallets += Number(item.pallets) || 0;

      const tour = String(item.tourNumber || "").trim();
      if (tour) day.tours.add(tour);
    }

    return [...days.values()]
      .sort((a, b) => a.dateKey.localeCompare(b.dateKey))
      .map(day => ({
        dateKey: day.dateKey,
        stores: day.stores,
        pallets: day.pallets,
        tours: [...day.tours].sort((a, b) => Number(a) - Number(b)),
        trailers: day.tours.size
      }));
  }

  async function exportExcel() {
    saveDailyAssignment();
    if (typeof XLSX === "undefined") {
      error.textContent = translations[language].historyImportError;

      .sort((a, b) => String(a.createdAt).localeCompare(String(b.createdAt)));

    entries = await enrichHistoryEntries(entries);

    const data = [[...text.excelHeaders]];
    let previousDay = "";
    const countedDayTours = new Set();

    for (const item of entries) {
      const day = localDateKey(item.createdAt);

      if (previousDay && day !== previousDay) {
        data.push(["────────", "────────", "────────", "────────", "────────", "────────────────", "────────", "────────"]);
      }

      previousDay = day;
      const date = new Date(item.createdAt);

      const tour = String(item.tourNumber || "").trim();
      const dayTourKey = tour ? `${day}|${tour}` : "";
      const trailerValue = dayTourKey && !countedDayTours.has(dayTourKey) ? 1 : "";

      if (dayTourKey) countedDayTours.add(dayTourKey);

      data.push([
        date.toLocaleDateString(language === "no" ? "nb-NO" : language === "en" ? "en-GB" : "pl-PL"),
        date.toLocaleTimeString(language === "no" ? "nb-NO" : language === "en" ? "en-GB" : "pl-PL", { hour: "2-digit", minute: "2-digit" }),
        tour,
        String(item.trailerNumber || ""),
        String(item.storeNumber || ""),
        String(item.storeName || ""),
        Number(item.pallets) || 0,
        trailerValue
      ]);
    }

    const totalPallets = entries.reduce((sum, item) => sum + (Number(item.pallets) || 0), 0);
    const totalTrailers = monthlyTrailerTotal(entries);

    data.push([]);
    data.push([
      language === "no" ? "MÅNEDSSUM" : language === "en" ? "MONTH TOTAL" : "PODSUMOWANIE MIESIĄCA",
      "",
      "",
      "",
      "",
      "",
      totalPallets,
      totalTrailers
    ]);

    const worksheet = XLSX.utils.aoa_to_sheet(data);
    worksheet["!cols"] = [
      { wch: 11 }, // Data
      { wch: 7 },  // Godzina
      { wch: 4 },  // Tura
      { wch: 4 },  // Naczepa
      { wch: 8 },  // Nr sklepu
      { wch: 26 }, // Nazwa sklepu
      { wch: 4 },  // Palety
      { wch: 4 }   // Liczba naczep
    ];
    worksheet["!autofilter"] = { ref: "A1:H1" };

    // Wyśrodkowanie krótkich kolumn: Tura, Naczepa, Palety, Naczepy.
    const centeredColumns = ["C", "D", "G", "H"];
    const range = XLSX.utils.decode_range(worksheet["!ref"]);
    centeredColumns.forEach(columnLetter => {
      const columnIndex = XLSX.utils.decode_col(columnLetter);
      for (let row = range.s.r; row <= range.e.r; row++) {
        const address = XLSX.utils.encode_cell({ r: row, c: columnIndex });
        const cell = worksheet[address];
        if (!cell) continue;
        cell.s = cell.s || {};
        cell.s.alignment = {
          ...(cell.s.alignment || {}),
          horizontal: "center",
          vertical: "center"
        };
      }
    });

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, language === "no" ? "Leveringer" : language === "en" ? "Deliveries" : "Dostawy");
    XLSX.writeFile(workbook, `${text.excelFilePrefix}-${month}.xlsx`, { compression: true });
    setTimeout(restoreDailyAssignment, 250);
  }

  async function historyBackupPost(payload) {
    const body = JSON.stringify(payload);

    // Nie używamy keepalive. Przeglądarki ograniczają łączny rozmiar
    // żądań keepalive do około 64 KB, a pełna historia może być większa.
    const response = await fetch(HISTORY_BACKUP_API_URL, {
      method: "POST",
      mode: "no-cors",
      cache: "no-store",
      redirect: "follow",
      headers: { "Content-Type": "text/plain;charset=UTF-8" },
      body
    });

    return response;
  }

  function historyBackupRequest(action, profile, backupKey) {
    return new Promise((resolve, reject) => {
      const callback = `__europrisBackup_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script = document.createElement("script");
      const timeout = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 30000);
      function cleanup(){clearTimeout(timeout);delete window[callback];script.remove();}
      window[callback] = result => { cleanup(); resolve(result); };
      script.onerror = () => { cleanup(); reject(new Error("network")); };
      const query = new URLSearchParams({
        action, token: ADMIN_API_TOKEN, profile, backupKey, callback, _: String(Date.now())
      });
      script.src = `${HISTORY_BACKUP_API_URL}?${query.toString()}`;
      document.head.appendChild(script);
    });
  }

  async function initializeHistoryCloudBackup(showMessage=false) {
    const text=translations[language],profile=historyBackupProfileId();
    if(!profile)return false;
    if(showMessage)historyCloudStatus.textContent=text.historyCloudInitializing;
    const result=await historyBackupRequest("history_backup_init",profile,HISTORY_BACKUP_KEYS[profile]);
    return Boolean(result?.ok);
  }

  async function verifyHistoryCloudBackup(profile,generatedAt) {
    for(let attempt=0;attempt<10;attempt++){
      await new Promise(resolve=>setTimeout(resolve,1200));
      const result=await historyBackupRequest(
        "history_backup_status",
        profile,
        HISTORY_BACKUP_KEYS[profile]
      );
      if(result?.ok&&result.generatedAt===generatedAt)return true;
    }
    return false;
  }

  async function saveHistoryCloudBackup(showMessage=false) {
    const text=translations[language],profile=historyBackupProfileId();
    if(!profile){if(showMessage)historyCloudStatus.textContent=text.historyCloudNoProfile;return false;}
    try{
      if(!await initializeHistoryCloudBackup(showMessage))throw new Error("init_failed");
      if(showMessage)historyCloudStatus.textContent=text.historyCloudSaving;
      const data=await buildHistoryBackupPayload();
      await historyBackupPost({
        action:"history_backup_save",token:ADMIN_API_TOKEN,profile,
        backupKey:HISTORY_BACKUP_KEYS[profile],data
      });
      if(!await verifyHistoryCloudBackup(profile,data.generatedAt))throw new Error("not_verified");
      localStorage.setItem(HISTORY_BACKUP_LAST_DAY_KEY,historyBackupDayKey());
      if(showMessage)historyCloudStatus.textContent=text.historyCloudSaved;
      return true;
    }catch(error){
      console.error("History backup save:",error);
      if(showMessage)historyCloudStatus.textContent=text.historyCloudError;
      return false;
    }
  }

  function historyBackupJsonp(profile, backupKey) {
    return new Promise((resolve,reject) => {
      const callback=`__europrisHistoryBackup_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      const script=document.createElement("script");
      const timeout=setTimeout(()=>{cleanup();reject(new Error("timeout"));},30000);
      function cleanup(){clearTimeout(timeout);delete window[callback];script.remove();}
      window[callback]=result=>{cleanup();resolve(result);};
      script.onerror=()=>{cleanup();reject(new Error("network"));};
      const query=new URLSearchParams({
        action:"history_backup_get",token:ADMIN_API_TOKEN,profile,backupKey,callback,_:String(Date.now())
      });
      script.src=`${HISTORY_BACKUP_API_URL}?${query.toString()}`;
      document.head.appendChild(script);
    });
  }

  async function restoreHistoryCloudBackup() {
    const text=translations[language];
    const profile=historyBackupProfileId();
    if(!profile){historyCloudStatus.textContent=text.historyCloudNoProfile;return;}
    if(!confirm(text.historyCloudConfirm))return;
    historyCloudStatus.textContent=text.historyCloudRestoring;
    try{
      const result=await historyBackupJsonp(profile,HISTORY_BACKUP_KEYS[profile]);
      if(!result?.ok||!result.data){
        historyCloudStatus.textContent=result?.error==="Not found"?text.historyCloudNoBackup:text.historyCloudError;
        return;
      }
      const deliveries=Array.isArray(result.data.deliveries)?result.data.deliveries:[];
      const privateContacts=Array.isArray(result.data.privateContacts)?result.data.privateContacts:[];
      const db=await openDatabase();
      await new Promise((resolve,reject)=>{
        const tx=db.transaction([DB_STORE,DB_CONTACTS],"readwrite");
        const deliveryStore=tx.objectStore(DB_STORE);
        const contactStore=tx.objectStore(DB_CONTACTS);
        deliveries.forEach(item=>{if(item?.id&&item?.createdAt&&item?.storeNumber)deliveryStore.put(item);});
        privateContacts.forEach(item=>{if(item?.storeNumber&&item?.phone)contactStore.put(item);});
        tx.oncomplete=resolve;
        tx.onerror=()=>reject(tx.error);
      });
      db.close();
      await syncCurrentStore();
      await renderHistory();
      historyCloudStatus.textContent=text.historyCloudRestored;
    }catch(error){
      console.error("History backup restore:",error);
      historyCloudStatus.textContent=text.historyCloudError;
    }
  }

  function scheduleHistoryBackup(reason="change") {
    if(!historyBackupProfileId())return;
    clearTimeout(historyBackupTimer);
    historyBackupTimer=setTimeout(()=>void saveHistoryCloudBackup(false),reason==="delivery-save"?800:2500);
  }

  function scheduleDailyHistoryBackup() {
    clearTimeout(historyBackupTimer);
    const now=new Date();
    const target=new Date(now);
    target.setHours(23,59,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    historyBackupTimer=setTimeout(async()=>{
      await saveHistoryCloudBackup(false);
      scheduleDailyHistoryBackup();
    },Math.min(target-now,2147483647));
    if(localStorage.getItem(HISTORY_BACKUP_LAST_DAY_KEY)!==historyBackupDayKey()){
      setTimeout(()=>void saveHistoryCloudBackup(false),5000);
    }
  }

    const text = translations[language];

    try {
      const data = JSON.parse(await file.text());

      const deliveries = Array.isArray(data)
        ? data
        : Array.isArray(data.deliveries) ? data.deliveries : [];

      const privateContacts = Array.isArray(data.privateContacts)
        ? data.privateContacts
        : [];

      const db = await openDatabase();
      await new Promise((resolve, reject) => {
        const tx = db.transaction([DB_STORE, DB_CONTACTS], "readwrite");
        const deliveryStore = tx.objectStore(DB_STORE);
        const contactStore = tx.objectStore(DB_CONTACTS);

        for (const item of deliveries) {
          if (item && item.id && item.createdAt && item.storeNumber) {
            deliveryStore.put(item);
          }
        }

        for (const contact of privateContacts) {
          if (contact && contact.storeNumber && contact.phone) {
            contactStore.put(contact);
          }
        }

        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();

      await syncCurrentStore();

      error.textContent = text.historyImportOk;
      await renderHistory();
      scheduleHistoryBackup("history-import");
    } catch {
      error.textContent = text.historyImportError;
    }
  }

  async function openAndSaveDelivery() {
    saveDailyAssignment();
    const number = cleanNumber(currentNumber);

    if (!/^\d{1,8}$/.test(number) || !currentStore) {
      error.textContent = translations[language].error;
      return;
    }

    const tour = cleanTourNumber(tourNumber.value);
    const trailer = cleanTrailerNumber(trailerNumber.value);

    if (!/^\d{1,2}$/.test(tour) || !/^\d{1,2}$/.test(trailer)) {
      error.textContent = translations[language].tourTrailerRequired;

      if (!/^\d{1,2}$/.test(tour)) {
        tourNumber.focus();
      } else {
        trailerNumber.focus();
      }
      return;
    }

    tourNumber.value = tour;
    trailerNumber.value = trailer;
    saveDailyAssignment();

    try {
      await addDelivery(currentStore, trailer, tour);
      error.textContent = translations[language].historySaved;
      if (!historyPanel.hidden) await renderHistory();
    } catch {
      error.textContent = translations[language].historyImportError;
      return;
    }
    window.location.assign(deliveryUrl(number));
  }

  async function callStore() {
    await syncCurrentStore();
    const digits = String(currentStore?.phone || "").replace(/\D/g, "");
    if (/^\d{8}$/.test(digits)) window.location.href = `tel:+47${digits}`;
  }

  async function callPrivate() {
    await syncCurrentStore();
    const digits = String(currentPrivateContact?.phone || "").replace(/\D/g, "");
    if (!/^\d{8,15}$/.test(digits)) return;

    const telNumber = digits.length === 8 ? `+47${digits}` : `+${digits}`;
    window.location.href = `tel:${telNumber}`;
  }

  async function saveCurrentPrivateContact() {
    const text = translations[language];

    if (!currentStore) return;

    const digits = String(privatePhone.value || "").replace(/\D/g, "");
    if (!/^\d{8,15}$/.test(digits)) {
      error.textContent = text.privateInvalid;
      return;
    }

    await savePrivateContact(
      currentStore.number,
      privateName.value,
      digits
    );

    await syncCurrentStore();
    privatePanel.hidden = true;
    error.textContent = text.privateSaved;
    scheduleHistoryBackup("contact-save");
  }

  async function deleteCurrentPrivateContact() {
    if (!currentStore || !currentPrivateContact) return;

    await deletePrivateContact(currentStore.number);
    await syncCurrentStore();
    privatePanel.hidden = true;
    error.textContent = translations[language].privateDeleted;
    scheduleHistoryBackup("contact-delete");
  }

  function openDelivery() {
    saveDailyAssignment();
    const number = cleanNumber(currentNumber);

    if (!/^\d{1,8}$/.test(number)) {
      error.textContent = translations[language].error;
      return;
    }

    window.location.assign(
      DELIVERY_BASE + encodeURIComponent(number) + DELIVERY_SUFFIX
    );
  }

  async function openNavigation() {
    saveDailyAssignment();
    await syncCurrentStore();

    if (!hasValidCoordinates(currentStore)) {
      error.textContent = translations[language].navigationError;
      return;
    }

    const latitude = Number(currentStore.latitude);
    const longitude = Number(currentStore.longitude);
    const destination = encodeURIComponent(`${latitude},${longitude}`);
    const url = `${GOOGLE_MAPS_DIRECTIONS}&destination=${destination}&travelmode=driving`;

    window.location.assign(url);
  }

  tourNumber.addEventListener("input", () => {
    tourNumber.value = cleanTourNumber(tourNumber.value);
    saveDailyAssignment();
  });

  tourNumber.addEventListener("change", saveDailyAssignment);

  trailerNumber.addEventListener("input", () => {
    trailerNumber.value = cleanTrailerNumber(trailerNumber.value);
    saveDailyAssignment();
  });

  trailerNumber.addEventListener("change", saveDailyAssignment);

  document.querySelectorAll("[data-digit]").forEach(button => {
    button.addEventListener("click", () => {
      if (!/^\d*$/.test(search.value)) {
        search.value = "";
        clearSelection();
      }

      if (currentNumber.length >= MAX_NUMBER_LENGTH) return;

      currentNumber += button.dataset.digit;
      currentNumber = cleanNumber(currentNumber);
      currentStore = findStoreByNumber(currentNumber);
      currentName = currentStore ? cleanStoreName(currentStore.name) : "";
      search.value = currentNumber;
      results.replaceChildren();
      void updateSelected().then(() => {
      });
    });
  });

  document.getElementById("clear").addEventListener("click", () => {
    search.value = "";
    results.replaceChildren();
    void clearSelection();
  });

  document.getElementById("back").addEventListener("click", () => {
    if (!/^\d*$/.test(search.value)) {
      search.value = "";
      results.replaceChildren();
      void clearSelection();
      return;
    }

    currentNumber = currentNumber.slice(0, -1);
    currentStore = findStoreByNumber(currentNumber);
    currentName = currentStore ? cleanStoreName(currentStore.name) : "";
    search.value = currentNumber;
    void updateSelected();
  });

  openButton.addEventListener("click", openDelivery);
  openSaveButton.addEventListener("click", openAndSaveDelivery);
  navigateButton.addEventListener("click", openNavigation);
  callButton.addEventListener("click", callStore);
  callPrivateButton.addEventListener("click", callPrivate);

  editPrivateButton.addEventListener("click", async () => {
    await syncCurrentStore();
    if (!currentStore) return;
    privatePanel.hidden = !privatePanel.hidden;
  });

  privateSave.addEventListener("click", saveCurrentPrivateContact);
  privateDelete.addEventListener("click", deleteCurrentPrivateContact);

  historyToggle.addEventListener("click", async () => {
    historyPanel.hidden = false;
    await renderHistory();
    historyPanel.scrollIntoView({ behavior: "smooth", block: "start" });
  });

  historyClose.addEventListener("click", () => { historyPanel.hidden = true; });
  historyMonth.addEventListener("change", renderHistory);
  historyPrint.addEventListener("click", () => window.print());
  historyPrintSummary.addEventListener("click", printMonthlySummaryA4);
  historyCsv.addEventListener("click", exportExcel);
  historyJson.addEventListener("click", exportJson);
  historyImport.addEventListener("click", () => historyImportFile.click());
  historyCloudBackup.addEventListener("click", () => void saveHistoryCloudBackup(true));
  historyCloudRestore.addEventListener("click", () => void restoreHistoryCloudBackup());

  historyImportFile.addEventListener("change", async () => {
    const file = historyImportFile.files?.[0];
    if (file) await importJson(file);
    historyImportFile.value = "";
  });

  historyClear.addEventListener("click", async () => {
    if (!confirm(translations[language].historyClearConfirm)) return;
    await clearMonth(historyMonth.value);
    await renderHistory();
  });

  useNearest.addEventListener("click", () => {
    if (nearestStore) {
      selectStore(nearestStore);
      locationResult.textContent = translations[language].locationAuto(
        nearestStore.number,
        cleanStoreName(nearestStore.name),
        formatDistance(nearestDistanceMeters)
      );
      nearestWasAutoSelected = true;
      useNearest.hidden = true;
    }
  });

  retryLocation.addEventListener("click", requestNearestStore);
  forceLocation.addEventListener("click", forceNearestStoreLocation);
  search.addEventListener("input", () => { void handleSearchInput(); });

  document.querySelectorAll("[data-lang]").forEach(button => {
    button.addEventListener("click", () => {
      language = button.dataset.lang;
      localStorage.setItem(LANGUAGE_KEY, language);
      applyLanguage();
    });
  });


  restoreDailyAssignment();
  historyMonth.value = new Date().toISOString().slice(0, 7);
  status.textContent = translations[language].loading;
  applyLanguage();
  void updateSelected();
  scheduleDailyHistoryBackup();

  fetch("stores.json?v=36", { cache: "no-store" })
    .then(response => {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .then(data => {
      stores = Array.isArray(data) ? data : [];

      // Usuń stary, błędny duplikat Holmestrand.
      // Prawidłowy sklep pozostaje pod numerem 632.
      stores = stores.filter(store => !(
        (Number(store.number) === 42 && normalized(store.name).includes("holmestrand")) ||
        (Number(store.number) === 269 && normalized(store.name).includes("leira"))
      ));

      status.textContent = translations[language].loaded(stores.length);
      void handleSearchInput();
      if (!historyPanel.hidden) renderHistory();

      if (!locationRequestedThisLaunch) {
        locationRequestedThisLaunch = true;
        requestNearestStore();
      }
    })
    .catch(() => {
      stores = [];
      currentStore = null;
      navigateButton.disabled = true;
      status.textContent = translations[language].loadError;
      locationMessage.textContent = translations[language].locationNoCoordinates;
    });





  window.addEventListener("pageshow", restoreDailyAssignment);
  window.addEventListener("focus", restoreDailyAssignment);

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) restoreDailyAssignment();
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js", {
        updateViaCache: "none"
      }).catch(() => {
        // Aplikacja działa dalej online nawet bez Service Workera.
      });
    });
  }
})();
