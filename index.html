<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Europris">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="europris-app-icon-180-v28.png">
  <link rel="icon" type="image/png" sizes="192x192" href="europris-app-icon-192-v28.png">
  <link rel="icon" type="image/png" sizes="512x512" href="europris-app-icon-512-v28.png">

  <title>Europris</title>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --green: #08783e;
      --green-dark: #065f34;
      --green-text: #ffffff;
      --key: #e5e7eb;
      --danger: #b91c1c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #111827;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #374151;
        --key: #1f2937;
        --danger: #fca5a5;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 14px;
    }

    button, input { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }
    button:disabled { cursor: not-allowed; opacity: .48; }

    main {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .10);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(112px, 1fr) auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 12px;
    }

    .brand-mark {
      min-height: 80px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 6px 8px 0;
      overflow: hidden;
    }

    .brand-character {
      width: 54px;
      height: 68px;
      flex: 0 0 54px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, .22));
    }

    .brand-copy {
      min-width: 0;
      line-height: 1.05;
    }

    .brand-name {
      color: var(--green);
      font-weight: 950;
      letter-spacing: .05em;
      font-size: .92rem;
    }

    .brand-tagline {
      margin-top: 4px;
      color: var(--muted);
      font-size: .68rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .topbar-controls {
      width: 158px;
      display: grid;
      gap: 7px;
    }

    .languages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin: 0;
    }

    .language {
      min-width: 48px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    .language.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    h1 {
      margin: 0 0 7px;
      font-size: 1.4rem;
    }

    .description {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.4;
    }

    .location-panel {
      margin-bottom: 13px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--green) 7%, transparent);
    }

    .location-heading { margin: 0 0 6px; font-size: 1rem; font-weight: 850; }
    .location-message { color: var(--muted); line-height: 1.35; font-size: .92rem; }
    .location-result { margin-top: 9px; font-weight: 800; line-height: 1.35; }
    .location-actions { display: flex; gap: 8px; margin-top: 10px; }

    .location-button {
      flex: 1;
      min-height: 43px;
      border: 1px solid var(--green);
      border-radius: 11px;
      background: var(--green);
      color: #fff;
      font-weight: 800;
    }

    .location-button.secondary {
      background: transparent;
      color: var(--green);
    }

    .search {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0 14px;
      background: transparent;
      color: var(--text);
      font-size: 1.08rem;
      outline: none;
    }

    .search:focus { border-color: var(--green); }

    .results {
      display: grid;
      gap: 8px;
      margin-top: 9px;
      max-height: 245px;
      overflow-y: auto;
    }

    .result {
      width: 100%;
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .result-number {
      display: inline-block;
      min-width: 50px;
      color: var(--green);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .result-name { font-weight: 750; font-size: 1rem; }

    .selected {
      margin-top: 12px;
      min-height: 72px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 8px 12px;
    }

    .selected-number {
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--green);
    }

    .selected-name {
      color: var(--muted);
      font-size: .92rem;
      margin-top: 3px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 11px;
    }

    .key {
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--key);
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 850;
    }


    .trailer-panel {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--green) 5%, transparent);
    }

    .trailer-label {
      font-weight: 900;
    }

    .trailer-hint {
      margin-top: 3px;
      color: var(--muted);
      font-size: .78rem;
    }

    .trailer-input {
      width: 100%;
      min-height: 48px;
      border: 2px solid var(--green);
      border-radius: 11px;
      background: var(--surface);
      color: var(--text);
      text-align: center;
      font-size: 1.35rem;
      font-weight: 950;
    }

    .history-trailer {
      border-top: 1px solid var(--border);
    }

    .history-trailer:first-child {
      border-top: 0;
    }

    .history-trailer-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      background: color-mix(in srgb, var(--green) 8%, transparent);
      font-weight: 900;
    }

    .history-trailer-count {
      color: var(--muted);
      font-size: .82rem;
      white-space: nowrap;
    }

    .main-actions {
      display: grid;
      gap: 9px;
      margin-top: 11px;
    }

    .action-button {
      width: 100%;
      min-height: 58px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 850;
    }

    .open {
      border: 0;
      background: var(--green);
      color: var(--green-text);
    }

    .navigate {
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
    }

    .navigate:not(:disabled):active,
    .navigate:not(:disabled):focus-visible {
      background: color-mix(in srgb, var(--green) 12%, transparent);
    }


    /* Tylko trzy kafelki zależne od wyboru sklepu:
       nieaktywne = czerwony napis, aktywne = dotychczasowy zielony. */
    #navigate:disabled,
    #call:disabled,
    #callPrivate:disabled {
      color: #e60000;
    }

    .error {
      min-height: 23px;
      margin-top: 8px;
      color: #e60000;
      font-weight: 700;
    }

    .recent-title {
      margin-top: 15px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 750;
    }

    .recent {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .chip {
      min-height: 40px;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      font-weight: 750;
    }



    .phone-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }



    .private-panel[hidden] {
      display: none !important;
    }

    .private-panel {
      margin-top: 9px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: grid;
      gap: 8px;
    }

    .private-panel input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      padding: 0 10px;
    }

    .private-panel-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .private-panel-actions button {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--green);
      background: transparent;
      color: var(--green);
      font-weight: 800;
    }

    .private-panel-actions .delete {
      border-color: #e60000;
      color: #e60000;
    }

    .private-contact-info {
      color: var(--muted);
      font-size: .88rem;
      text-align: center;
      min-height: 20px;
    }

    .history-toggle {
      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    .history-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-title { margin: 0; font-size: 1.05rem; }

    .history-close {
      min-width: 42px;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-weight: 900;
    }

    .history-controls {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .history-controls input,
    .history-controls button {
      min-height: 44px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0 10px;
      font-weight: 750;
    }

    .history-controls button {
      border-color: var(--green);
      color: var(--green);
    }

    .history-summary {
      margin: 8px 0 10px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 700;
    }

    .history-list { display: grid; gap: 10px; }


    .history-day {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: color-mix(in srgb, var(--green) 4%, transparent);
    }

    .history-day-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 900;
    }

    .history-day-count {
      color: var(--muted);
      font-size: .86rem;
      white-space: nowrap;
    }

    .history-day-list {
      display: grid;
    }

    .history-day .history-item {
      border: 0;
      border-radius: 0;
      border-bottom: 1px solid var(--border);
    }

    .history-day .history-item:last-child {
      border-bottom: 0;
    }


    .history-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .history-item-main { display: grid; gap: 3px; }
    .history-item-number { color: var(--green); font-weight: 900; }
    .history-item-date { color: var(--muted); font-size: .86rem; }

    .history-item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .history-item-actions button {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      padding: 0 9px;
      font-weight: 750;
      font-size: .86rem;
    }

    .history-item-actions .delete {
      color: #e60000;
      border-color: #e60000;
    }

    .history-empty {
      color: var(--muted);
      text-align: center;
      padding: 14px 6px;
    }


    @media (max-width: 360px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .brand-mark {
        min-height: auto;
      }

      .topbar-controls {
        width: 100%;
      }
    }

    @media print {
      body { background: #fff; color: #000; padding: 0; }

      .languages, .location-panel, .search, .results, .selected, .keypad,
      .main-actions, #error, #historyToggle, .history-close,
      .history-controls, .status, .footer {
        display: none !important;
      }

      .card { border: 0; box-shadow: none; padding: 0; }
      .history-panel { display: block !important; border: 0; margin: 0; padding: 0; }
      .history-item { break-inside: avoid; border-color: #bbb; }
      .history-item-actions { display: none !important; }
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }

    .footer {
      margin: 16px 4px 4px;
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
      line-height: 1.35;
    }
  </style>
</head>

<body>
<main>
  <section class="card">
    <div class="topbar">
      <div class="brand-mark" aria-label="Created by Rumcajs and AI">
        <img class="brand-character" src="rumcajs-logo.png?v=25" alt="Rumcajs">
        <div class="brand-copy">
          <div class="brand-name">RUMCAJS</div>
          <div class="brand-tagline">Created with AI</div>
        </div>
      </div>

      <div class="topbar-controls">
        <div class="languages">
          <button class="language" data-lang="pl">PL</button>
          <button class="language" data-lang="no">NO</button>
          <button class="language" data-lang="en">EN</button>
        </div>
      </div>
    </div>

    <h1 id="title"></h1>
    <p id="description" class="description"></p>

    <div class="location-panel">
      <div id="locationHeading" class="location-heading"></div>
      <div id="locationMessage" class="location-message"></div>
      <div id="locationResult" class="location-result"></div>
      <div class="location-actions">
        <button id="useNearest" class="location-button" hidden></button>
        <button id="retryLocation" class="location-button secondary"></button>
      </div>
    </div>

    <input
      id="search"
      class="search"
      type="search"
      autocomplete="off"
      enterkeyhint="search"
    >

    <div id="results" class="results"></div>

    <div id="selected" class="selected">
      <div>
        <div id="selectedNumber" class="selected-number">—</div>
        <div id="selectedName" class="selected-name"></div>
      </div>
    </div>

    <div class="keypad">
      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key" id="clear">C</button>
      <button class="key" data-digit="0">0</button>
      <button class="key" id="back">⌫</button>
    </div>

    <section class="trailer-panel">
      <div>
        <div id="trailerLabel" class="trailer-label"></div>
        <div id="trailerHint" class="trailer-hint"></div>
      </div>
      <input
        id="trailerNumber"
        class="trailer-input"
        type="text"
        inputmode="numeric"
        pattern="[0-9]{1,2}"
        maxlength="2"
        autocomplete="off"
        aria-label="Numer naczepy"
      >
    </section>

    <div class="main-actions">
      <button id="open" class="action-button open"></button>
      <button id="openSave" class="action-button open"></button>
      <button id="navigate" class="action-button navigate" disabled></button>

      <div class="phone-row">
        <button id="call" class="action-button navigate" disabled></button>
        <button id="callPrivate" class="action-button navigate" disabled></button>
      </div>

      <button id="editPrivate" class="action-button navigate" disabled></button>

      <section id="privatePanel" class="private-panel" hidden>
        <input id="privateName" type="text" autocomplete="off">
        <input id="privatePhone" type="tel" inputmode="tel" autocomplete="tel">
        <div class="private-panel-actions">
          <button id="privateSave" type="button"></button>
          <button id="privateDelete" class="delete" type="button"></button>
        </div>
        <div id="privateInfo" class="private-contact-info"></div>
      </section>
    </div>

    <div id="error" class="error" role="alert" aria-live="polite"></div>

    <button id="historyToggle" class="history-toggle"></button>

    <section id="historyPanel" class="history-panel" hidden>
      <div class="history-header">
        <h2 id="historyTitle" class="history-title"></h2>
        <button id="historyClose" class="history-close" type="button">×</button>
      </div>

      <div class="history-controls">
        <input id="historyMonth" type="month">
        <button id="historyPrint" type="button"></button>
        <button id="historyCsv" type="button"></button>
        <button id="historyJson" type="button"></button>
        <button id="historyImport" type="button"></button>
        <button id="historyClear" type="button"></button>
        <input id="historyImportFile" type="file" accept="application/json,.json" hidden>
      </div>

      <div id="historySummary" class="history-summary"></div>
      <div id="historyList" class="history-list"></div>
    </section>

    <div id="status" class="status"></div>
  </section>

  <div id="footer" class="footer"></div>
</main>

<script src="xlsx.full.min.js"></script>

  function currentLocalDateKey() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function trailerStorageKey() {
    return `${TRAILER_KEY_PREFIX}${currentLocalDateKey()}`;
  }

  function cleanTrailerNumber(value) {
    return String(value || "").replace(/\D/g, "").slice(0, 2);
  }

  function loadTrailerNumber() {
    trailerNumber.value = cleanTrailerNumber(
      localStorage.getItem(trailerStorageKey()) || ""
    );
  }

  function saveTrailerNumber() {
    const value = cleanTrailerNumber(trailerNumber.value);
    trailerNumber.value = value;

    if (value) {
      localStorage.setItem(trailerStorageKey(), value);
    } else {
      localStorage.removeItem(trailerStorageKey());
    }
  }

  function normalized(value) {
    return String(value)
      .toLocaleLowerCase("nb-NO")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function cleanStoreName(name) {
    return String(name || "").replace(/^Europris\s*/i, "").trim();
  }

  function cleanNumber(value) {
    return String(value)
      .replace(/\D/g, "")
      .replace(/^0+(?=\d)/, "");
  }

  function hasValidCoordinates(store) {
    if (!store) return false;
    const latitude = Number(store.latitude);
    const longitude = Number(store.longitude);
    return Number.isFinite(latitude) &&
      Number.isFinite(longitude) &&
      latitude >= -90 && latitude <= 90 &&
      longitude >= -180 && longitude <= 180;
  }

  function findStoreByNumber(number) {
    return stores.find(store => String(store.number) === String(number)) || null;
  }

  async function syncCurrentStore() {
    currentStore = findStoreByNumber(currentNumber);
    navigateButton.disabled = !hasValidCoordinates(currentStore);

    const phoneDigits = String(currentStore?.phone || "").replace(/\D/g, "");
    callButton.disabled = !/^\d{8}$/.test(phoneDigits);
    editPrivateButton.disabled = !currentStore;

    currentPrivateContact = currentStore
      ? await getPrivateContact(String(currentStore.number))
      : null;

    const privateDigits = String(currentPrivateContact?.phone || "").replace(/\D/g, "");
    callPrivateButton.disabled = !/^\d{8,15}$/.test(privateDigits);
    privateDelete.disabled = !currentPrivateContact;

    if (currentPrivateContact) {
      privateName.value = currentPrivateContact.name || "";
      privatePhone.value = currentPrivateContact.phone || "";
      privateInfo.textContent = currentPrivateContact.name || "";
    } else {
      privateName.value = "";
      privatePhone.value = "";
      privateInfo.textContent = "";
    }
  }

  function renderSearchResults(query) {
    results.replaceChildren();

    const text = normalized(query);
    if (!text || /^\d+$/.test(text)) return;

    const matches = stores

      .slice(0, MAX_RESULTS);

    for (const store of matches) {

      await updateSelected();
      return;

    await clearSelection();
    renderSearchResults(value);

  function toRadians(value) {
    return value * Math.PI / 180;
  }

  function distanceMeters(lat1, lon1, lat2, lon2) {
    const earthRadius = 6371000;
    const dLat = toRadians(lat2 - lat1);
    const dLon = toRadians(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRadians(lat1)) *
      Math.cos(toRadians(lat2)) *
      Math.sin(dLon / 2) ** 2;
    return earthRadius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function formatDistance(meters) {
    if (meters < 1000) return `${Math.round(meters)} m`;
    return `${(meters / 1000).toFixed(meters < 10000 ? 1 : 0)} km`;
  }

  function findNearestStore(latitude, longitude) {
    const valid = stores.filter(hasValidCoordinates);
    if (!valid.length) return null;

    let best = null;
    for (const store of valid) {
      const distance = distanceMeters(
        latitude,
        longitude,
        Number(store.latitude),
        Number(store.longitude)
      );
      if (!best || distance < best.distance) best = { store, distance };
    }
    return best;
  }

  function showNearestResult(best) {
    const text = translations[language];
    nearestStore = best.store;
    nearestDistanceMeters = best.distance;

    const name = cleanStoreName(best.store.name);
    const distance = formatDistance(best.distance);
    nearestWasAutoSelected = best.distance <= 1000;

    if (nearestWasAutoSelected) {
      void selectStore(best.store);
      locationMessage.textContent = "";
      locationResult.textContent = text.locationAuto(best.store.number, name, distance);
      useNearest.hidden = true;
      return;
    }

    locationMessage.textContent = "";
    locationResult.textContent = text.locationSuggestion(best.store.number, name, distance);
    useNearest.hidden = false;
  }

  function requestNearestStore() {
    const text = translations[language];

    useNearest.hidden = true;
    nearestStore = null;
    nearestDistanceMeters = null;
    nearestWasAutoSelected = false;
    locationResult.textContent = "";
    locationMessage.textContent = text.locationChecking;

    if (!navigator.geolocation) {
      locationMessage.textContent = text.locationUnavailable;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => {
        const best = findNearestStore(
          position.coords.latitude,
          position.coords.longitude
        );

        if (!best) {
          locationMessage.textContent = text.locationNoCoordinates;
          return;
        }

        showNearestResult(best);
      },
      geolocationError => {
        locationMessage.textContent =
          geolocationError.code === geolocationError.PERMISSION_DENIED
            ? text.locationDenied
            : text.locationUnavailable;
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 60000
      }
    );
  }


  function openDatabase() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          const store = db.createObjectStore(DB_STORE, { keyPath: "id" });
          store.createIndex("createdAt", "createdAt");
          store.createIndex("month", "month");
        }

        if (!db.objectStoreNames.contains(DB_CONTACTS)) {
          db.createObjectStore(DB_CONTACTS, { keyPath: "storeNumber" });
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }


  async function getPrivateContact(storeNumber) {
    const db = await openDatabase();
    const result = await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_CONTACTS, "readonly");
      const request = tx.objectStore(DB_CONTACTS).get(String(storeNumber));
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => reject(request.error);
    });
    db.close();
    return result;
  }

  async function savePrivateContact(storeNumber, name, phone) {
    const db = await openDatabase();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_CONTACTS, "readwrite");
      tx.objectStore(DB_CONTACTS).put({
        storeNumber: String(storeNumber),
        name: String(name || "").trim(),
        phone: String(phone || "").trim(),
        updatedAt: new Date().toISOString()
      });
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }

  async function addDelivery(store, trailer) {
    const now = new Date();
    const entry = {
      id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
      storeNumber: String(store.number),
      storeName: cleanStoreName(store.name),
      trailerNumber: cleanTrailerNumber(trailer),
      address: String(store.address || ""),
      phone: String(store.phone || ""),
      latitude: Number(store.latitude),
      longitude: Number(store.longitude),
      createdAt: now.toISOString(),
      month: now.toISOString().slice(0, 7)
    };

    const db = await openDatabase();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).add(entry);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }

  async function getAllDeliveries() {
    const db = await openDatabase();
    const result = await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const request = tx.objectStore(DB_STORE).getAll();
      request.onsuccess = () => resolve(request.result || []);
      request.onerror = () => reject(request.error);
    });
    db.close();
    return result.sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));

  async function deleteDelivery(id) {
    const db = await openDatabase();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");

  async function clearMonth(month) {
    const ids = (await getAllDeliveries())
      .filter(item => item.month === month)
      .map(item => item.id);

    if (!ids.length) return;

    const db = await openDatabase();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      const store = tx.objectStore(DB_STORE);
      ids.forEach(id => store.delete(id));
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }

  function formatDateTime(value) {
    return new Intl.DateTimeFormat(language === "no" ? "nb-NO" : language, {
      dateStyle: "medium",
      timeStyle: "short"
    }).format(new Date(value));
  }

  function deliveryUrl(number) {
    return DELIVERY_BASE + encodeURIComponent(number) + DELIVERY_SUFFIX;
  }

  function mapsUrl(item) {
    const destination = encodeURIComponent(`${Number(item.latitude)},${Number(item.longitude)}`);
    return `${GOOGLE_MAPS_DIRECTIONS}&destination=${destination}&travelmode=driving`;
  }

  function localDateKey(value) {
    const date = new Date(value);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
  }

  function formatDayHeading(value) {
    return new Intl.DateTimeFormat(language === "no" ? "nb-NO" : language, {
      weekday: "long",
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    }).format(new Date(value));
  }

  async function renderHistory() {
    const text = translations[language];
    const entries = (await getAllDeliveries())
      .filter(item => localDateKey(item.createdAt).slice(0, 7) === historyMonth.value);

    historyList.replaceChildren();
    historySummary.textContent = text.historySummary(entries.length);

    if (!entries.length) {
      const empty = document.createElement("div");
      empty.className = "history-empty";
      empty.textContent = text.historyEmpty;
      historyList.appendChild(empty);
      return;
    }

    const dayGroups = new Map();

    for (const item of entries) {
      const dayKey = localDateKey(item.createdAt);
      if (!dayGroups.has(dayKey)) dayGroups.set(dayKey, []);
      dayGroups.get(dayKey).push(item);
    }

    for (const [dayKey, dayEntries] of dayGroups) {
      const dayCard = document.createElement("section");
      dayCard.className = "history-day";

      const header = document.createElement("div");
      header.className = "history-day-header";

      const heading = document.createElement("div");
      heading.textContent = formatDayHeading(`${dayKey}T12:00:00`);

      const count = document.createElement("div");
      count.className = "history-day-count";
      count.textContent = text.historySummary(dayEntries.length);

      header.append(heading, count);
      dayCard.appendChild(header);

      const trailerGroups = new Map();

      for (const item of dayEntries) {
        const trailerKey = cleanTrailerNumber(item.trailerNumber) || "";
        if (!trailerGroups.has(trailerKey)) trailerGroups.set(trailerKey, []);
        trailerGroups.get(trailerKey).push(item);
      }

      for (const [trailerKey, trailerEntries] of trailerGroups) {
        const trailerSection = document.createElement("section");
        trailerSection.className = "history-trailer";

        const trailerHeader = document.createElement("div");
        trailerHeader.className = "history-trailer-header";

        const trailerTitle = document.createElement("div");
        trailerTitle.textContent = trailerKey
          ? text.trailerTitle(trailerKey)
          : text.trailerUnnamed;

        const trailerCount = document.createElement("div");
        trailerCount.className = "history-trailer-count";
        trailerCount.textContent = text.trailerDeliveries(trailerEntries.length);

        trailerHeader.append(trailerTitle, trailerCount);

        const dayList = document.createElement("div");
        dayList.className = "history-day-list";

        for (const item of trailerEntries) {
          const card = document.createElement("article");
          card.className = "history-item";

          const main = document.createElement("div");
          main.className = "history-item-main";

          const store = document.createElement("div");
          store.className = "history-item-number";
          store.textContent = `${item.storeNumber} — ${item.storeName}`;

          const time = document.createElement("div");
          time.className = "history-item-date";
          time.textContent = new Intl.DateTimeFormat(
            language === "no" ? "nb-NO" : language,
            { hour: "2-digit", minute: "2-digit" }
          ).format(new Date(item.createdAt));

          const address = document.createElement("div");
          address.textContent = item.address || "";

          const actions = document.createElement("div");
          actions.className = "history-item-actions";

          const page = document.createElement("button");
          page.type = "button";
          page.textContent = text.historyOpen;
          page.addEventListener("click", () => {
            window.open(deliveryUrl(item.storeNumber), "_blank", "noopener,noreferrer");
          });

          const map = document.createElement("button");
          map.type = "button";
          map.textContent = text.historyMap;
          map.disabled =
            !Number.isFinite(Number(item.latitude)) ||
            !Number.isFinite(Number(item.longitude));
          map.addEventListener("click", () => {
            if (!map.disabled) {
              window.open(mapsUrl(item), "_blank", "noopener,noreferrer");
            }
          });

          const call = document.createElement("button");
          call.type = "button";
          call.textContent = text.historyCall;
          const digits = String(item.phone || "").replace(/\D/g, "");
          call.disabled = !/^\d{8}$/.test(digits);
          call.addEventListener("click", () => {
            if (!call.disabled) window.location.href = `tel:+47${digits}`;
          });

          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "delete";
          remove.textContent = text.historyDelete;
          remove.addEventListener("click", async () => {
            await deleteDelivery(item.id);
            await renderHistory();
          });

          actions.append(page, map, call, remove);
          main.append(store, time, address);
          card.append(main, actions);
          dayList.appendChild(card);
        }

        trailerSection.append(trailerHeader, dayList);
        dayCard.appendChild(trailerSection);
      }

      historyList.appendChild(dayCard);
    }
  }

  function downloadFile(filename, content, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }

  async function exportExcel() {
    if (typeof XLSX === "undefined") {
      error.textContent = translations[language].historyImportError;
      return;
    }

    const month = historyMonth.value;
    const entries = (await getAllDeliveries())
      .filter(item => localDateKey(item.createdAt).slice(0, 7) === month)
      .sort((a, b) => String(a.createdAt).localeCompare(String(b.createdAt)));

    const rows = entries.map(item => {
      const date = new Date(item.createdAt);

      return {
        "Data": date.toLocaleDateString("pl-PL"),
        "Godzina": date.toLocaleTimeString("pl-PL", {
          hour: "2-digit",
          minute: "2-digit"
        }),
        "Naczepa": String(item.trailerNumber || ""),
        "Numer sklepu": String(item.storeNumber || ""),
        "Nazwa sklepu": String(item.storeName || ""),
        "Adres": String(item.address || ""),
        "Telefon": String(item.phone || "")
      };
    });

    const worksheet = XLSX.utils.json_to_sheet(rows, {
      header: [
        "Data",
        "Godzina",
        "Naczepa",
        "Numer sklepu",
        "Nazwa sklepu",
        "Adres",
        "Telefon"
      ]
    });

    worksheet["!cols"] = [
      { wch: 13 },
      { wch: 10 },
      { wch: 10 },
      { wch: 14 },
      { wch: 25 },
      { wch: 42 },
      { wch: 14 }
    ];

    worksheet["!autofilter"] = {
      ref: worksheet["!ref"] || "A1:G1"
    };

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Dostawy");

    XLSX.writeFile(workbook, `europris-dostawy-${month}.xlsx`, {
      compression: true
    });
  }

  async function exportJson() {
    const deliveries = await getAllDeliveries();
    const privateContacts = await getAllPrivateContacts();

    downloadFile(
      `europris-kopia-${new Date().toISOString().slice(0, 10)}.json`,
      JSON.stringify({
        version: 3,
        deliveries,
        privateContacts
      }, null, 2),
      "application/json"
    );
  }

  async function importJson(file) {
    const text = translations[language];

    try {
      const data = JSON.parse(await file.text());

      const deliveries = Array.isArray(data)
        ? data
        : Array.isArray(data.deliveries) ? data.deliveries : [];

      const privateContacts = Array.isArray(data.privateContacts)
        ? data.privateContacts
        : [];

      const db = await openDatabase();
      await new Promise((resolve, reject) => {
        const tx = db.transaction([DB_STORE, DB_CONTACTS], "readwrite");
        const deliveryStore = tx.objectStore(DB_STORE);
        const contactStore = tx.objectStore(DB_CONTACTS);

        for (const item of deliveries) {
          if (item && item.id && item.createdAt && item.storeNumber) {
            deliveryStore.put(item);
          }
        }

        for (const contact of privateContacts) {
          if (contact && contact.storeNumber && contact.phone) {
            contactStore.put(contact);
          }
        }

        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();

      await syncCurrentStore();

      error.textContent = text.historyImportOk;
      await renderHistory();
    } catch {
      error.textContent = text.historyImportError;
    }
  }

  async function openAndSaveDelivery() {
    const number = cleanNumber(currentNumber);

    if (!/^\d{1,8}$/.test(number) || !currentStore) {
      error.textContent = translations[language].error;
      return;
    }

    const trailer = cleanTrailerNumber(trailerNumber.value);
    if (!/^\d{1,2}$/.test(trailer)) {
      error.textContent = translations[language].trailerRequired;
      trailerNumber.focus();
      return;
    }

    saveTrailerNumber();

    try {
      await addDelivery(currentStore, trailer);
      error.textContent = translations[language].historySaved;
      if (!historyPanel.hidden) await renderHistory();
    } catch {
      error.textContent = translations[language].historyImportError;
      return;
    }
    window.location.assign(deliveryUrl(number));
  }

  async function callStore() {
    await syncCurrentStore();
    const digits = String(currentStore?.phone || "").replace(/\D/g, "");
    if (/^\d{8}$/.test(digits)) window.location.href = `tel:+47${digits}`;
  }

  async function callPrivate() {
    await syncCurrentStore();
    const digits = String(currentPrivateContact?.phone || "").replace(/\D/g, "");
    if (!/^\d{8,15}$/.test(digits)) return;

    const telNumber = digits.length === 8 ? `+47${digits}` : `+${digits}`;
    window.location.href = `tel:${telNumber}`;
  }

  async function saveCurrentPrivateContact() {
    const text = translations[language];

    if (!currentStore) return;

    const digits = String(privatePhone.value || "").replace(/\D/g, "");
    if (!/^\d{8,15}$/.test(digits)) {
      error.textContent = text.privateInvalid;
      return;
    }

    await savePrivateContact(
      currentStore.number,
      privateName.value,
      digits
    );

    await syncCurrentStore();
    privatePanel.hidden = true;
    error.textContent = text.privateSaved;
  }

  async function deleteCurrentPrivateContact() {
    if (!currentStore || !currentPrivateContact) return;

    await deletePrivateContact(currentStore.number);
    await syncCurrentStore();
    privatePanel.hidden = true;
    error.textContent = translations[language].privateDeleted;
  }

  function openDelivery() {
    const number = cleanNumber(currentNumber);

    if (!/^\d{1,8}$/.test(number)) {
      error.textContent = translations[language].error;
      return;
    }

    window.location.assign(
      DELIVERY_BASE + encodeURIComponent(number) + DELIVERY_SUFFIX
    );
  }

  async function openNavigation() {
    await syncCurrentStore();

    if (!hasValidCoordinates(currentStore)) {
      error.textContent = translations[language].navigationError;
      return;
    }

    const latitude = Number(currentStore.latitude);
    const longitude = Number(currentStore.longitude);
    const destination = encodeURIComponent(`${latitude},${longitude}`);
    const url = `${GOOGLE_MAPS_DIRECTIONS}&destination=${destination}&travelmode=driving`;

    window.location.assign(url);
  }

  trailerNumber.addEventListener("input", () => {
    trailerNumber.value = cleanTrailerNumber(trailerNumber.value);
    saveTrailerNumber();
  });

  trailerNumber.addEventListener("change", saveTrailerNumber);

  document.querySelectorAll("[data-digit]").forEach(button => {
    button.addEventListener("click", () => {
      if (!/^\d*$/.test(search.value)) {
        search.value = "";
        clearSelection();
      }

      if (currentNumber.length >= MAX_NUMBER_LENGTH) return;

      currentNumber += button.dataset.digit;
      currentNumber = cleanNumber(currentNumber);
      currentStore = findStoreByNumber(currentNumber);
      currentName = currentStore ? cleanStoreName(currentStore.name) : "";
      search.value = currentNumber;
      results.replaceChildren();
      void updateSelected().then(() => {
      });
    });
  });

  document.getElementById("clear").addEventListener("click", () => {
    search.value = "";
    results.replaceChildren();
    void clearSelection();
  });

  document.getElementById("back").addEventListener("click", () => {
    if (!/^\d*$/.test(search.value)) {
      search.value = "";
      results.replaceChildren();
      void clearSelection();
      return;
    }

    currentNumber = currentNumber.slice(0, -1);
    currentStore = findStoreByNumber(currentNumber);
    currentName = currentStore ? cleanStoreName(currentStore.name) : "";
    search.value = currentNumber;
    void updateSelected();
  });

  openButton.addEventListener("click", openDelivery);
  openSaveButton.addEventListener("click", openAndSaveDelivery);
  navigateButton.addEventListener("click", openNavigation);
  callButton.addEventListener("click", callStore);
  callPrivateButton.addEventListener("click", callPrivate);

  editPrivateButton.addEventListener("click", async () => {
    await syncCurrentStore();
    if (!currentStore) return;
    privatePanel.hidden = !privatePanel.hidden;
  });

  privateSave.addEventListener("click", saveCurrentPrivateContact);
  privateDelete.addEventListener("click", deleteCurrentPrivateContact);

  historyToggle.addEventListener("click", async () => {
    historyPanel.hidden = false;
    await renderHistory();
    historyPanel.scrollIntoView({ behavior: "smooth", block: "start" });
  });

  historyClose.addEventListener("click", () => { historyPanel.hidden = true; });
  historyMonth.addEventListener("change", renderHistory);
  historyPrint.addEventListener("click", () => window.print());
  historyCsv.addEventListener("click", exportExcel);
  historyJson.addEventListener("click", exportJson);
  historyImport.addEventListener("click", () => historyImportFile.click());

  historyImportFile.addEventListener("change", async () => {
    const file = historyImportFile.files?.[0];
    if (file) await importJson(file);
    historyImportFile.value = "";
  });

  historyClear.addEventListener("click", async () => {
    if (!confirm(translations[language].historyClearConfirm)) return;
    await clearMonth(historyMonth.value);
    await renderHistory();
  });

  useNearest.addEventListener("click", () => {
    if (nearestStore) {
      selectStore(nearestStore);
      locationResult.textContent = translations[language].locationAuto(
        nearestStore.number,
        cleanStoreName(nearestStore.name),
        formatDistance(nearestDistanceMeters)
      );
      nearestWasAutoSelected = true;
      useNearest.hidden = true;
    }
  });

  retryLocation.addEventListener("click", requestNearestStore);
  search.addEventListener("input", () => { void handleSearchInput(); });

  document.querySelectorAll("[data-lang]").forEach(button => {
    button.addEventListener("click", () => {
      language = button.dataset.lang;
      localStorage.setItem(LANGUAGE_KEY, language);
      applyLanguage();
    });
  });


  loadTrailerNumber();
  historyMonth.value = new Date().toISOString().slice(0, 7);
  status.textContent = translations[language].loading;
  applyLanguage();
  void updateSelected();

  fetch("stores.json?v=28", { cache: "no-store" })
    .then(response => {
      if (!response.ok) throw new Error("HTTP " + response.status);
      return response.json();
    })
    .then(data => {
      stores = Array.isArray(data) ? data : [];

      // Usuń stary, błędny duplikat Holmestrand.
      // Prawidłowy sklep pozostaje pod numerem 632.
      stores = stores.filter(store => !(
        (Number(store.number) === 42 && normalized(store.name).includes("holmestrand")) ||
        (Number(store.number) === 269 && normalized(store.name).includes("leira"))
      ));

      status.textContent = translations[language].loaded(stores.length);
      void handleSearchInput();
      if (!historyPanel.hidden) renderHistory();

      if (!locationRequestedThisLaunch) {
        locationRequestedThisLaunch = true;
        requestNearestStore();
      }
    })
    .catch(() => {
      stores = [];
      currentStore = null;
      navigateButton.disabled = true;
      status.textContent = translations[language].loadError;
      locationMessage.textContent = translations[language].locationNoCoordinates;
    });





  if ("serviceWorker" in navigator) {
    let refreshing = false;

    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    window.addEventListener("load", async () => {
      try {
        const registration = await navigator.serviceWorker.register("sw.js", {
          updateViaCache: "none"
        });

        await registration.update();
      } catch {
        // Aplikacja działa dalej online nawet bez Service Workera.
      }
    });
  }
})();
</script>
