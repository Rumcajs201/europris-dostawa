<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Europris">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Europris – potwierdzenie dostawy</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --button: #111827;
      --button-text: #ffffff;
      --danger: #b91c1c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #111827;
        --text: #f9fafb;
        --muted: #9ca3af;
        --border: #374151;
        --button: #f9fafb;
        --button-text: #111827;
        --danger: #fca5a5;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 18px;
    }
    main {
      width: min(100%, 430px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,.12);
    }
    h1 { margin: 0 0 8px; font-size: 1.45rem; }
    p { margin: 0 0 20px; color: var(--muted); line-height: 1.45; }
    label { display: block; font-weight: 700; margin-bottom: 8px; }
    input {
      width: 100%;
      min-height: 58px;
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 0 16px;
      font-size: 1.35rem;
      text-align: center;
      letter-spacing: .08em;
      background: transparent;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--text); }
    button {
      width: 100%;
      min-height: 56px;
      margin-top: 14px;
      border: 0;
      border-radius: 14px;
      background: var(--button);
      color: var(--button-text);
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
    }
    .error {
      min-height: 24px;
      margin: 10px 2px 0;
      color: var(--danger);
      font-weight: 650;
    }
    .history-title {
      margin-top: 20px;
      font-weight: 750;
      color: var(--muted);
      font-size: .92rem;
    }
    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      width: auto;
      min-height: 42px;
      margin: 0;
      padding: 0 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 1rem;
    }
    .footer {
      margin-top: 20px;
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Potwierdzenie dostawy Europris</h1>
    <p>Wpisz numer sklepu. Aplikacja otworzy właściwą stronę transportową.</p>

    <form id="storeForm" novalidate>
      <label for="storeNumber">Numer sklepu</label>
      <input
        id="storeNumber"
        name="storeNumber"
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        enterkeyhint="go"
        maxlength="8"
        placeholder="np. 324"
        autofocus
      >
      <button type="submit">Otwórz stronę dostawy</button>
      <div id="error" class="error" role="alert" aria-live="polite"></div>
    </form>

    <div id="historyBlock" hidden>
      <div class="history-title">Ostatnio używane</div>
      <div id="history" class="history"></div>
    </div>

    <div class="footer">Działa na iPhone i Androidzie. Nie zapisuje haseł ani danych dostawy.</div>
  </main>

  <script>
    (() => {
      "use strict";

      const BASE_URL = "https://events.app.fourprosolutions.com/europris/";
      const URL_SUFFIX = "/transport";
      const STORAGE_KEY = "europris_recent_stores_v1";
      const MAX_RECENT = 6;

      const form = document.getElementById("storeForm");
      const input = document.getElementById("storeNumber");
      const error = document.getElementById("error");
      const historyBlock = document.getElementById("historyBlock");
      const historyEl = document.getElementById("history");

      const normalize = value => value.replace(/\D/g, "").replace(/^0+(?=\d)/, "");

      function loadRecent() {
        try {
          const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(data) ? data.filter(x => /^\d{1,8}$/.test(x)).slice(0, MAX_RECENT) : [];
        } catch {
          return [];
        }
      }

      function saveRecent(store) {
        const recent = loadRecent().filter(x => x !== store);
        recent.unshift(store);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(recent.slice(0, MAX_RECENT)));
      }

      function renderRecent() {
        const recent = loadRecent();
        historyEl.replaceChildren();
        historyBlock.hidden = recent.length === 0;

        for (const store of recent) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "chip";
          btn.textContent = store;
          btn.setAttribute("aria-label", `Otwórz sklep ${store}`);
          btn.addEventListener("click", () => openStore(store));
          historyEl.appendChild(btn);
        }
      }

      function openStore(rawValue) {
        const store = normalize(rawValue);

        if (!/^\d{1,8}$/.test(store)) {
          error.textContent = "Wpisz prawidłowy numer sklepu, używając tylko cyfr.";
          input.focus();
          return;
        }

        error.textContent = "";
        saveRecent(store);
        renderRecent();

        const destination = BASE_URL + encodeURIComponent(store) + URL_SUFFIX;
        window.location.assign(destination);
      }

      input.addEventListener("input", () => {
        const cleaned = input.value.replace(/\D/g, "");
        if (input.value !== cleaned) input.value = cleaned;
        error.textContent = "";
      });

      form.addEventListener("submit", event => {
        event.preventDefault();
        openStore(input.value);
      });

      renderRecent();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
